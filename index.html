<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="nav-container"></div>

    <header class="header">
        <div class="header__fond"></div>
        <div class="header__content">
            <h1>LANA GILBART</h1>
            <p>Développeur · Designer</p>
            <a href="portfolio.html" class="header__btn">Découvrir mes projets</a>
        </div>
    </header>

    <section class="travaux">
        <div class="travaux__top">
            <h2 class="travaux__titre">Travaux récents</h2>
            <a href="portfolio.html" class="travaux__lien">Voir tous <span>→</span></a>
        </div>

        <div class="travaux__projets">
            <div class="travaux__carte">
                <img src="img/Mockupmagazine.png" alt="Projet 1">
                <div class="travaux__carte__voile"></div>
                <div class="travaux__carte__info">
                    <span class="travaux__carte__label">Graphisme</span>
                    <span class="travaux__carte__nom">Livret de viyages</span>
                </div>
            </div>
            <div class="travaux__carte">
                <img src="img/projet2.jpg" alt="Projet 2">
                <div class="travaux__carte__voile"></div>
                <div class="travaux__carte__info">
                    <span class="travaux__carte__label">Web</span>
                    <span class="travaux__carte__nom">Projet 2</span>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>
    <script src="js/nav.js"></script>

</body>
</html>
