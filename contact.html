<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="nav-container"></div>

    <section class="contact">

        <div class="contact__haut">
            <span class="contact__tag">Contact</span>
            <h1 class="contact__titre">Travaillons<br><em>ensemble</em></h1>
        </div>

        <div class="contact__contenu">

            <div class="contact__gauche">
                <span class="contact__label">Complétez la phrase ci-dessous</span>

                <form
                    class="contact__form"
                    action="https://formspree.io/f/xlgapjrd"
                    method="POST"
                >
                    <p class="contact__phrase">
                        Je m'appelle
                        <input type="text" class="contact__input" name="prenom" placeholder="votre prénom" required>
                        , et j'aimerais collaborer sur un projet de
                        <input type="text" class="contact__input" name="projet" placeholder="type de projet" required>
                        . Mon adresse email est
                        <input type="email" class="contact__input" name="email" placeholder="email@exemple.com" required>
                        .
                    </p>

                    <input type="hidden" name="_subject" value="Nouveau message depuis le portfolio">

                    <button type="submit" class="contact__btn">Envoyer le message</button>
                </form>
            </div>

            <div class="contact__droite">

                <div class="contact__card">
                    <span class="contact__card-label">Email direct</span>
                    <a href="mailto:lanagilbart@gmail.com" class="contact__email">lanagilbart@gmail.com</a>
                </div>

                <div class="contact__reseaux">
                    <span class="contact__card-label">Réseaux sociaux</span>
                    <a href="#" class="contact__reseau" target="_blank">Instagram →</a>
                    <a href="#" class="contact__reseau" target="_blank">LinkedIn →</a>
                    <a href="#" class="contact__reseau" target="_blank">Github →</a>
                </div>

            </div>
        </div>

    </section>

    <div id="footer-container"></div>

    <script src="js/nav.js"></script>
</body>
</html>
