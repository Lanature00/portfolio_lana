<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="nav-container"></div>

    <section class="portfolio">
        <div class="portfolio__top">
            <span class="portfolio__tag">Mes projets</span>
            <div class="portfolio__filtres">
                <button class="portfolio__filtre actif" data-filtre="tous">Tous les projets</button>
                <button class="portfolio__filtre" data-filtre="web">3D</button>
                <button class="portfolio__filtre" data-filtre="graphisme">Graphisme</button>
                <button class="portfolio__filtre" data-filtre="design">Design UI/UX</button>
                <button class="portfolio__filtre" data-filtre="illustration">Illustration</button>
                <button class="portfolio__filtre" data-filtre="wordpress">WordPress</button>
                <button class="portfolio__filtre" data-filtre="workshop">Workshop</button>

            </div>
        </div>

        <div class="portfolio__grille">

            <a href="feuillettouristique.html" class="portfolio__carte" data-categorie="graphisme">
                <img
                    src="img/Espagne.webp"
                    srcset="img/Espagne.webp 400w, img/Espagne.webp 800w"
                    sizes="(max-width: 768px) 100vw, 600px"
                    alt="Magazine Mockup">
                <div class="portfolio__carte-info">
                    <span class="portfolio__carte-nom">Feuillet touristique</span>
                    <span class="portfolio__carte-annee">2025</span>
                </div>
                <p class="portfolio__carte-cat">Graphisme</p>
            </a>

            <a href="uneligne.html" class="portfolio__carte" data-categorie="workshop">
                <img
                    src="img/Posters_Mockup.webp"
                    srcset="img/Posters_Mockup.webp 400w, img/Posters_Mockup.webp 800w"
                    sizes="(max-width: 768px) 100vw, 600px"
                    alt="Une Ligne et des Âmes — Affiche sérigraphiée">
                <div class="portfolio__carte-info">
                    <span class="portfolio__carte-nom">Une Ligne et des Âmes</span>
                    <span class="portfolio__carte-annee">2024</span>
                </div>
                <p class="portfolio__carte-cat">Workshop</p>
            </a>

            <a href="cd.html" class="portfolio__carte" data-categorie="graphisme"></a>
            <div class="portfolio__carte" data-categorie="graphisme">
                <img
                    src="img/cd.webp"
                    srcset="img/projet3-small.webp 400w, img/cd.webp 800w"
                    sizes="(max-width: 768px) 100vw, 600px"
                    alt="Projet Design">
                <div class="portfolio__carte-info">
                    <span class="portfolio__carte-nom">Pochette CD</span>
                    <span class="portfolio__carte-annee">2025</span>
                </div>
                <p class="portfolio__carte-cat">Graphisme</p>
            </div>

            <div class="portfolio__carte" data-categorie="illustration">
                <img
                    src="img/projet4.webp"
                    srcset="img/projet4-small.webp 400w, img/projet4.webp 800w"
                    sizes="(max-width: 768px) 100vw, 600px"
                    alt="Illustration">
                <div class="portfolio__carte-info">
                    <span class="portfolio__carte-nom">Illustration</span>
                    <span class="portfolio__carte-annee">2025</span>
                </div>
                <p class="portfolio__carte-cat">Illustration</p>
            </div>

            <div class="portfolio__carte" data-categorie="wordpress">
                <img
                    src="img/projet5.webp"
                    srcset="img/projet5-small.webp 400w, img/projet5.webp 800w"
                    sizes="(max-width: 768px) 100vw, 600px"
                    alt="Projet WordPress">
                <div class="portfolio__carte-info">
                    <span class="portfolio__carte-nom">Projet WordPress</span>
                    <span class="portfolio__carte-annee">2025</span>
                </div>
                <p class="portfolio__carte-cat">WordPress</p>
            </div>

            <div class="portfolio__carte" data-categorie="graphisme">
                <img
                    src="img/projet6.webp"
                    srcset="img/projet6-small.webp 400w, img/projet6.webp 800w"
                    sizes="(max-width: 768px) 100vw, 600px"
                    alt="Projet Graphisme">
                <div class="portfolio__carte-info">
                    <span class="portfolio__carte-nom">Projet Graphisme</span>
                    <span class="portfolio__carte-annee">2025</span>
                </div>
                <p class="portfolio__carte-cat">Graphisme</p>
            </div>

        </div>
    </section>

    <div id="footer-container"></div>
    <script src="js/nav.js"></script>
    <script src="js/portfolio.js"></script>

</body>
</html>
